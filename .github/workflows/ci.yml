name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Nightly integration smoke test at 02:00 UTC
    - cron: '0 2 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & type-check ───────────────────────────────────────────────────────
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── Unit + integration tests (node:test) ─────────────────────────────────────
  unit:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run all node:test suites
        run: |
          node \
            --require ./node_modules/jiti/register.js \
            --test \
            "lib/__tests__/**/*.test.ts"
        # Report failures as annotations
        env:
          NODE_TEST_REPORTER: spec

  # ── E2E tests (Playwright) ───────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    # Only run E2E on main push and nightly — not every PR to save minutes
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Start app
        run: npm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:      ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET:                    ${{ secrets.CRON_SECRET }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL:    http://localhost:3000
          E2E_USER_EMAIL:         ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD:      ${{ secrets.E2E_USER_PASSWORD }}
          E2E_OWNER_EMAIL:        ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD:     ${{ secrets.E2E_OWNER_PASSWORD }}
          CRON_SECRET:            ${{ secrets.CRON_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Trial cron smoke (nightly only, against staging) ─────────────────────────
  trial-cron-smoke:
    name: Trial cron smoke (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Call /api/trial/check-status dry-run
        run: |
          STATUS=$(curl -s -o /tmp/cron-response.json -w "%{http_code}" \
            -X POST "$STAGING_URL/api/trial/check-status" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"dryRun":true}')

          echo "HTTP status: $STATUS"
          cat /tmp/cron-response.json | python3 -m json.tool

          if [ "$STATUS" != "200" ]; then
            echo "::error::Trial cron returned HTTP $STATUS"
            exit 1
          fi

          # Verify dry_run=true in response (no emails sent)
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/cron-response.json'))
          assert data.get('dry_run') == True, 'dry_run must be true'
          assert data.get('emails_sent') == 0, 'emails_sent must be 0 in dry_run'
          print('Smoke test passed:', data)
          "
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
